name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint
        run: ruff check nhs_forecast

      - name: Tests
        run: pytest -q

      - name: Smoke-run end-to-end pipeline
        run: python -m nhs_forecast.pipeline.cli run --synthetic --no-scenarios

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t nhs-equipment-forecast:ci .
